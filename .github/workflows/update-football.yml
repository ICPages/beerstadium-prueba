name: Update Football Data

on:

  workflow_dispatch:

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Script
        run: node scripts/update-football.js
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

      - name: Commit JSON
        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/*.json

          git commit -m "Update football data" || echo "No changes"

          git push
